<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default meta — JS overwrites per-page before paint -->

    <meta name="author" content="Navneet Arya" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AI Nexus" />
    <meta property="og:url" content="https://ainexustools.online/" />
    <meta property="og:title" content="AI Nexus — Best AI Tools Reviewed 2026" />
    <meta property="og:description" content="Independent AI tool reviews by someone who actually uses them. Every link is a free trial." />
    <meta property="og:image" content="https://ainexustools.online/og-image.png" />
    <meta property="og:locale" content="en" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ainexustools" />
    <meta name="twitter:creator" content="@ainexustools" />
    <meta name="twitter:title" content="AI Nexus — Best AI Tools Reviewed 2026" />

    <meta name="twitter:image" content="https://ainexustools.online/og-image.png" />

    <!-- Indexing -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />

    <!-- GEO targeting — global -->
    <meta name="geo.region" content="" />
    <meta name="geo.placename" content="Global" />

    <!-- Schema: WebSite with SearchAction (AEO) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AI Nexus",
      "url": "https://ainexustools.online",
      "description": "Independent AI tool reviews and comparisons by Navneet Arya — every tool personally tested before recommendation.",
      "inLanguage": "en",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://ainexustools.online/?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "AI Nexus",
        "url": "https://ainexustools.online",
        "logo": {
          "@type": "ImageObject",
          "url": "https://ainexustools.online/favicon.svg"
        },
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "hello@ainexustools.online",
          "contactType": "editorial"
        }
      }
    }
    </script>

    <!-- Schema: Person — EEAT author identity (AEO trust signal) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Navneet Arya",
      "url": "https://ainexustools.online/about",
      "email": "hello@ainexustools.online",
      "sameAs": ["https://twitter.com/ainexustools"],
      "description": "Independent AI tools reviewer and founder of AI Nexus. Testing AI tools since 2022 across writing, audio, video, design, and productivity.",
      "knowsAbout": [
        "Artificial Intelligence",
        "AI Writing Tools",
        "Podcast Software",
        "Social Media Automation",
        "AI Productivity Tools",
        "Content Creation",
        "AI Image Generation",
        "AI Coding Tools"
      ],
      "worksFor": {
        "@type": "Organization",
        "name": "AI Nexus",
        "url": "https://ainexustools.online"
      },
      "hasCredential": {
        "@type": "EducationalOccupationalCredential",
        "description": "2+ years personally testing and reviewing AI tools across 8 categories"
      }
    }
    </script>

    <script type="application/ld+json">

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Dark editorial fonts: Playfair Display (headlines) + IBM Plex Sans (body) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg: #0E0C0B;
        --surf: #161412;
        --surf2: #1E1A17;
        --txt: #F0EBE3;
        --mut: rgba(240,235,227,0.58);
        --mut2: rgba(240,235,227,0.32);
        --acc: #E9A93A;
        --acc2: #3BC98F;
        --acc-card: rgba(233,169,58,0.07);
        --acc-brd: rgba(233,169,58,0.18);
        --brd: rgba(240,235,227,0.08);
        --brd2: rgba(240,235,227,0.14);
        --bar-bg: rgba(14,12,11,0.97);
        --bar-brd: rgba(240,235,227,0.09);
        --green-card: rgba(59,201,143,0.07);
        --green-brd: rgba(59,201,143,0.18);
        --font-display: 'Playfair Display', Georgia, serif;
        --font-body: 'IBM Plex Sans', system-ui, sans-serif;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; scroll-behavior: smooth; }
      body {
        -webkit-font-smoothing: antialiased;
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--txt);
      }
      a { text-decoration: none; color: inherit; }
      button { font-family: inherit; cursor: pointer; border: none; background: none; }
      img, svg { display: block; }
      ::selection { background: rgba(233,169,58,0.25); color: var(--txt); }

      /* Subtle noise texture on bg */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        opacity: 0.025;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      }
    </style>
  </head>
  <body>
    <div id="root" style="position:relative;z-index:1;"></div>
    <!-- GitHub Pages SPA routing: restore path from ?p= query param set by 404.html -->
    <script>
      (function() {
        var p = window.location.search.slice(1);
        if (p && p.startsWith('p=')) {
          var decoded = decodeURIComponent(p.slice(2));
          history.replaceState(null, null, decoded);
        }
      })();
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
