<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>AI Nexus — Best AI Tools Reviewed & Ranked 2026</title>
    <meta name="description" content="Honest, no-BS reviews of 50+ AI tools for writing, video, image, audio, and productivity. Every tool has a free trial. Updated weekly." />
    <meta name="keywords" content="best AI tools 2026, AI writing tools, AI video tools, AI image generator, AI productivity tools, AI tools review" />
    <link rel="canonical" href="https://ainexus-tools.netlify.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ainexus-tools.netlify.app/" />
    <meta property="og:title" content="AI Nexus — Best AI Tools Reviewed & Ranked 2026" />
    <meta property="og:description" content="Honest reviews of 50+ AI tools. Every link is a free trial. No fluff, updated weekly." />
    <meta property="og:image" content="https://ainexus-tools.netlify.app/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:description" content="Honest reviews of 50+ AI tools. Every link is a free trial." />

    <!-- Schema.org -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AI Nexus",
      "url": "https://ainexus-tools.netlify.app",
      "description": "Curated directory of the best AI tools with honest reviews and free trial links",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://ainexus-tools.netlify.app/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Fonts: Clash Display (bold headings) + Plus Jakarta Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { font-size: 16px; }
      body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      a { text-decoration: none; color: inherit; }
      button { font-family: inherit; }
      h1, h2, h3, h4, h5, h6 { margin: 0; font-weight: inherit; }
      p { margin: 0; }
      img, svg { display: block; }
      /* Prevent any highlight/annotation overlays */
      ::selection { background: #ede9fe; }
    </style>
  </head>
  <body>
