<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default meta — JS overwrites per-page before paint -->
    <title>AI Nexus — Best AI Tools Reviewed &amp; Ranked 2026 by Navneet Arya</title>
    <meta name="description" content="Honest reviews of the best AI tools for writing, podcasting, social media, coding and productivity. Every tool personally tested by Navneet Arya. Every link is a free trial." />
    <link rel="canonical" href="https://ainexustools.online/" />
    <meta name="author" content="Navneet Arya" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AI Nexus" />
    <meta property="og:url" content="https://ainexustools.online/" />
    <meta property="og:title" content="AI Nexus — Best AI Tools Reviewed 2026 by Navneet Arya" />
    <meta property="og:description" content="Honest AI tool reviews by someone who actually uses them. Every link is a free trial." />
    <meta property="og:image" content="https://ainexustools.online/og-image.png" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ainexustools" />
    <meta name="twitter:creator" content="@ainexustools" />
    <meta name="twitter:title" content="AI Nexus — Best AI Tools Reviewed 2026" />
    <meta name="twitter:description" content="Honest AI tool reviews by someone who actually uses them. Every link is a free trial." />
    <meta name="twitter:image" content="https://ainexustools.online/og-image.png" />

    <!-- Indexing -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />

    <!-- Schema: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AI Nexus",
      "url": "https://ainexustools.online",
      "description": "Honest AI tool reviews by Navneet Arya — every tool personally tested.",
      "inLanguage": "en-IN",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://ainexustools.online/?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "AI Nexus",
        "url": "https://ainexustools.online"
      }
    }
    </script>

    <!-- Schema: Person (EEAT author identity) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Navneet Arya",
      "url": "https://ainexustools.online/about",
      "email": "hello@ainexus.tools",
      "description": "AI tools reviewer and founder of AI Nexus. Testing AI tools since 2022 across writing, audio, video, design, and productivity.",
      "knowsAbout": [
        "Artificial Intelligence",
        "AI Writing Tools",
        "Podcast Software",
        "Social Media Automation",
        "AI Productivity Tools",
        "Content Creation"
      ],
      "worksFor": {
        "@type": "Organization",
        "name": "AI Nexus",
        "url": "https://ainexustools.online"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --bg:#F5F4FF; --surf:#FFFFFF; --a1:#5B21B6; --a2:#06B6D4;
        --txt:#0F0F1A; --mut:rgba(15,15,26,.66); --mut2:rgba(15,15,26,.38);
        --a1-card:rgba(91,33,182,.065); --a1-brd:rgba(91,33,182,.18);
        --a2-card:rgba(6,182,212,.065); --a2-brd:rgba(6,182,212,.18);
        --bar-bg:rgba(245,244,255,.97); --bar-brd:rgba(91,33,182,.13);
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; scroll-behavior: smooth; }
      body { -webkit-font-smoothing: antialiased; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--txt); }
      a { text-decoration: none; color: inherit; }
      button { font-family: inherit; cursor: pointer; border: none; background: none; }
      img, svg { display: block; }
      ::selection { background: rgba(91,33,182,0.15); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA routing: restore path from ?p= query param set by 404.html -->
    <script>
      (function() {
        var p = window.location.search.slice(1);
        if (p && p.startsWith('p=')) {
          var decoded = decodeURIComponent(p.slice(2));
          history.replaceState(null, null, decoded);
        }
      })();
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
