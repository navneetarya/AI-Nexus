<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>AI Nexus</title>
  <script>
    // GitHub Pages SPA redirect: preserve path through query string
    var path = window.location.pathname + window.location.search + window.location.hash;
    window.location.replace(
      window.location.origin + '/?p=' + encodeURIComponent(path)
    );
  </script>
</head>
<body></body>
</html>
