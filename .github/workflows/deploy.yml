name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build + Pre-render all routes
        # vite build compiles the React app, then scripts/prerender.mjs
        # creates dist/<route>/index.html for every URL in the sitemap.
        # This ensures GitHub Pages returns HTTP 200 (not 404) for all pages,
        # making them crawlable by Google, Bing, and AI answer engines.
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  ping-search-engines:
    # Notify Google and Bing about sitemap updates after every deploy
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Ping Google
        run: |
          curl -sf "https://www.google.com/ping?sitemap=https://ainexustools.online/sitemap.xml" \
            && echo "Google pinged ✓" || echo "Google ping failed (non-fatal)"

      - name: Ping Bing
        run: |
          curl -sf "https://www.bing.com/ping?sitemap=https://ainexustools.online/sitemap.xml" \
            && echo "Bing pinged ✓" || echo "Bing ping failed (non-fatal)"
